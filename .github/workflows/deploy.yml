name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DIRECT_DEBIT_SANDBOX_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.DIRECT_DEBIT_SANDBOX_EC2_SSH_KEY }}
          source: "build/libs/direct-debit-sandbox-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/"
          strip_components: 2

      - name: Restart app on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIRECT_DEBIT_SANDBOX_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.DIRECT_DEBIT_SANDBOX_EC2_SSH_KEY }}
          script: |
            pkill -f 'direct-debit-sandbox' || true
            nohup java -jar /home/ec2-user/direct-debit-sandbox-0.0.1-SNAPSHOT.jar > /home/ec2-user/app.log 2>&1 &
