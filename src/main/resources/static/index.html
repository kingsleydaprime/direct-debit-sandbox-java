<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITC Direct Debit Sandbox — API Docs</title>
  <link rel="stylesheet" href="docs.css" />
</head>
<body>

  <header class="topbar">
    <button class="btn-sidebar-toggle" id="btn-sidebar-toggle" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <rect x="1" y="3"    width="14" height="1.5" rx="1"/>
        <rect x="1" y="7.25" width="14" height="1.5" rx="1"/>
        <rect x="1" y="11.5" width="14" height="1.5" rx="1"/>
      </svg>
    </button>
    <div class="topbar-brand">
      <!-- <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg> -->
      <!-- <span class="topbar-name">ITC Direct Debit</span> -->
      <img fetchpriority="high" src="https://www.itconsortiumgh.com/wp-content/uploads/2020/07/ITC-Logo-01-light.png" title="" alt="" loading="lazy" style="width: 100px; height: auto;">
      <span class="topbar-badge">Sandbox</span>
    </div>
    <nav class="topbar-nav">
      <a class="topbar-link" href="/documentation">Documentation</a>
      <a class="topbar-link topbar-link-active" href="/">Sandbox</a>
      <a class="topbar-link" href="/docs" target="_blank">Swagger UI ↗</a>
    </nav>
    <button class="btn-authorize" id="btn-authorize">
      <span class="auth-dot" id="auth-dot"></span>
      Authorize
    </button>
  </header>

  <div class="layout" id="layout">

    <nav class="sidebar">
      <div class="sidebar-search">
        <input type="search" id="search-input" placeholder="Search operations…" autocomplete="off" />
      </div>
      <div id="sidebar-nav">
        <div class="sidebar-loading">Loading…</div>
      </div>
    </nav>

    <main class="content" id="content">
      <div class="welcome-placeholder">
        <div class="spinner"></div>
      </div>
    </main>

    <aside class="try-panel" id="try-panel">
      <div class="try-panel-head">
        <div id="try-panel-title"></div>
        <button class="try-close" id="try-close" title="Close">✕</button>
      </div>
      <div class="try-panel-body" id="try-panel-body"></div>
    </aside>

  </div>

  <!-- Authorize modal -->
  <div class="overlay" id="overlay">
    <div class="auth-modal">
      <div class="auth-modal-head">
        <h3>Available authorizations</h3>
        <button class="modal-x" id="modal-x">✕</button>
      </div>
      <div class="auth-modal-body" id="auth-modal-body"></div>
      <div class="auth-modal-foot">
        <button class="btn-ghost" id="btn-clear-auth">Clear all</button>
        <button class="btn-primary" id="btn-save-auth">Authorize</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="docs.js"></script>
</body>
</html>
